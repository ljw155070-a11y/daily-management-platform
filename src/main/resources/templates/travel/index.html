<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{page.travel.title})}"></head>
<body>

<div th:replace="~{fragments/header :: header(${activeTab})}"></div>

<link rel="stylesheet" th:href="@{/css/travel.css}">

<div class="travel-layout">
    <div class="map-wrapper">
        <div id="map"></div>
        <div class="map-stats-card">
            <div class="stat-item stat-item--level">
                <span class="stat-value stat-level-lv" id="stat-level-lv">Lv.1</span>
                <span class="stat-label stat-level-title" id="stat-level-title">동네 산책자</span>
                <div class="stat-level-bar-wrap">
                    <div class="stat-level-bar" id="stat-level-bar" style="width:0%"></div>
                </div>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-value" id="stat-provinces">0<small>/17</small></span>
                <span class="stat-label" id="stat-provinces-label">방문 시도</span>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">총 장소</span>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-value" id="stat-travel">0</span>
                <span class="stat-label">여행지</span>
            </div>
            <div class="stat-sep"></div>
            <div class="stat-item">
                <span class="stat-value" id="stat-food">0</span>
                <span class="stat-label">맛집</span>
            </div>
        </div>

        <div class="boundary-level-toggle">
            <button type="button" id="btn-level-province" class="boundary-btn active" onclick="setBoundaryLevel('province')">광역시/도</button>
            <button type="button" id="btn-level-city"     class="boundary-btn"        onclick="setBoundaryLevel('city')">시/군/구</button>
        </div>

        <div class="map-guide-badge">오른쪽 마우스를 클릭해서 방문한 여행지를 등록해보세요!</div>

        <div id="map-form-overlay" class="map-form-overlay">
            <div class="map-form-card">
                <div class="map-form-header">
                    <p class="panel-form-title">📍 <span>장소 등록</span></p>
                    <button type="button" id="btn-form-close" class="map-form-close" aria-label="닫기">×</button>
                </div>

                <div class="category-toggle">
                    <button type="button" class="category-btn active" data-value="TRAVEL">✈ 여행지</button>
                    <button type="button" class="category-btn" data-value="RESTAURANT">🍴 맛집</button>
                </div>

                <div class="form-group">
                    <label class="form-label" for="fld-place-name">장소명</label>
                    <input id="fld-place-name" type="text" class="form-input" placeholder="여행지나 맛집 이름을 입력하세요">
                </div>

                <div class="form-group">
                    <label class="form-label" for="fld-address">주소</label>
                    <div class="addr-row">
                        <input id="fld-address" type="text" class="form-input" placeholder="우클릭 위치 주소가 자동 입력됩니다">
                        <button type="button" id="btn-addr-search" class="btn-addr">주소 검색</button>
                    </div>
                    <p class="addr-notice">자동 입력된 주소는 직접 수정할 수 있습니다.</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="fld-review">메모</label>
                    <textarea id="fld-review" class="form-input" placeholder="후기나 메모를 자유롭게 남겨보세요"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="fld-image">이미지</label>
                    <input id="fld-image" type="file" class="form-file-input" accept="image/*">
                    <div id="place-image-preview" class="place-image-preview"></div>
                </div>

                <div class="save-row">
                    <button type="button" id="btn-cancel" class="btn-cancel" style="display:none">취소</button>
                    <button type="button" id="btn-save" class="btn-save">저장하기</button>
                </div>
            </div>
        </div>
    </div>

    <aside class="travel-panel">
        <div class="panel-public">
<div class="public-header">
                <div>
                    <p class="public-title">공공 여행지</p>
                    <p class="public-desc">지도에서 지역을 클릭하면 해당 지역의 여행지를 불러옵니다.</p>
                </div>
                <div class="public-actions">
                    <button type="button" id="btn-sync-public" class="btn-public-sync" th:disabled="${!tourApiEnabled}">
                        <span th:text="${tourApiEnabled} ? '지금 동기화' : 'API 키 필요'">지금 동기화</span>
                    </button>
                </div>
            </div>
            <p id="public-status" class="public-status"
               th:text="${tourApiEnabled} ? '지도에서 지역을 클릭하면 여행지를 불러옵니다.' : 'application.properties에 tourapi.service-key를 추가하면 이 기능을 사용할 수 있습니다.'">
                지도에서 지역을 클릭하면 여행지를 불러옵니다.
            </p>
            <div id="public-preview" class="public-preview"></div>
            <div id="public-list" class="public-list"></div>
        </div>

        <div class="panel-history">
            <div class="history-header">
                <span class="history-title">저장한 장소</span>
                <span id="history-count" class="history-count" th:text="${places.size()}">0</span>
            </div>
            <div id="history-list"></div>
        </div>
    </aside>
</div>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<th:block th:if="${not #strings.isEmpty(kakaoApiKey)}">
    <script th:src="${'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + kakaoApiKey + '&libraries=services,clusterer'}"></script>
</th:block>

<script th:src="@{/js/travel.js(v=13)}"></script>

</body>
</html>
