<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - ' + #{app.name}">Daily Hub</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>

<th:block th:fragment="header(activeTab)">
    <header>
        <div class="header-inner">
            <a th:href="@{/}" class="logo">
                <span class="logo-icon">&#8962;</span>
                <span class="logo-text" th:text="#{app.name}">Daily Hub</span>
            </a>

            <nav class="nav" th:if="${activeTab != 'home'}">
                <a th:href="@{/travel}" th:classappend="${activeTab == 'travel'} ? ' active'" class="nav-item">
                    <span class="nav-icon">&#9992;</span>
                    <span th:text="#{nav.travel}">Travel</span>
                </a>
                <a th:href="@{/finance}" th:classappend="${activeTab == 'finance'} ? ' active'" class="nav-item">
                    <span class="nav-icon">&#128176;</span>
                    <span th:text="#{nav.finance}">Finance</span>
                </a>
                <a th:href="@{/education}" th:classappend="${activeTab == 'education'} ? ' active'" class="nav-item">
                    <span class="nav-icon">&#128218;</span>
                    <span th:text="#{nav.education}">Education</span>
                </a>
                <a th:href="@{/health}" th:classappend="${activeTab == 'health'} ? ' active'" class="nav-item">
                    <span class="nav-icon">&#10084;</span>
                    <span th:text="#{nav.health}">Health</span>
                </a>
            </nav>

            <div class="header-tools">
                <div class="lang-switcher">
                    <a th:href="@{__${currentPath}__(lang='ko')}"
                       th:classappend="${#locale.language == 'ko'} ? ' active'"
                       class="lang-link">KO</a>
                    <a th:href="@{__${currentPath}__(lang='en')}"
                       th:classappend="${#locale.language == 'en'} ? ' active'"
                       class="lang-link">EN</a>
                </div>

                <div class="header-auth">
                    <span class="header-user" th:if="${authenticated}" th:text="${currentDisplayName}">Member</span>
                    <a class="header-link" th:if="${!authenticated}" th:href="@{/login}" th:text="#{auth.login}">Login</a>
                    <a class="header-link header-link--primary" th:if="${!authenticated}" th:href="@{/register}" th:text="#{auth.register}">Register</a>
                    <form th:if="${authenticated}" th:action="@{/logout}" method="post">
                        <input type="hidden" name="lang" th:value="${#locale.language}">
                        <button type="submit" class="header-link header-link--button" th:text="#{auth.logout}">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <th:block th:if="${authenticated}">
        <div id="tb-root"
             th:attr="data-page-key=${currentPageKey},data-active-tab=${activeTab},data-authenticated=${authenticated},data-csrf-header=${_csrf.headerName},data-csrf-token=${_csrf.token}">
            <div id="tb-overlay" onclick="tbClose()"></div>

            <aside id="tb-drawer" aria-hidden="true" aria-labelledby="tb-title">
                <div class="tb-head">
                    <span id="tb-title">작업 현황판</span>
                    <button type="button" class="tb-close" onclick="tbClose()" aria-label="작업 현황판 닫기">&times;</button>
                </div>

                <div class="tb-add">
                    <input id="tb-input" class="tb-input" placeholder="현재 페이지 작업을 입력해 주세요" maxlength="80"
                           onkeydown="if(event.key === 'Enter') tbAdd()">
                    <select id="tb-sel" class="tb-sel" aria-label="작업 상태">
                        <option value="todo">예정</option>
                        <option value="doing">진행 중</option>
                        <option value="done">완료</option>
                    </select>
                    <button type="button" class="tb-btn-add" onclick="tbAdd()">추가</button>
                </div>

                <div class="tb-filters">
                    <button type="button" class="tb-filter active" data-filter="all" onclick="tbFilter(this)">전체</button>
                    <button type="button" class="tb-filter" data-filter="todo" onclick="tbFilter(this)">예정</button>
                    <button type="button" class="tb-filter" data-filter="doing" onclick="tbFilter(this)">진행 중</button>
                    <button type="button" class="tb-filter" data-filter="done" onclick="tbFilter(this)">완료</button>
                </div>

                <ul id="tb-list" class="tb-list"></ul>

                <div class="tb-footer">
                    <span id="tb-count" class="tb-count-txt"></span>
                    <button type="button" class="tb-btn-clear" onclick="tbClearDone()">완료 항목 지우기</button>
                </div>
            </aside>

            <button id="tb-toggle" type="button" onclick="tbOpen()" title="작업 현황판 열기" aria-label="작업 현황판 열기">
                <span>작업</span>
                <span class="tb-badge" id="tb-badge" style="display:none"></span>
            </button>
        </div>

        <style>
        #tb-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #4a6cf7;
            color: #fff;
            border: none;
            padding: 14px 10px;
            border-radius: 10px 0 0 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            z-index: 1100;
            box-shadow: -2px 0 12px rgba(74, 108, 247, 0.25);
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        #tb-toggle:hover { background: #3a5ce5; }

        .tb-badge {
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            padding: 0 3px;
        }

        #tb-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1200;
        }

        #tb-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: #fff;
            z-index: 1300;
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            transition: right 0.3s cubic-bezier(.4, 0, .2, 1);
            border-radius: 16px 0 0 16px;
        }

        #tb-drawer.open { right: 0; }

        .tb-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 14px;
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
        }

        .tb-close {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #64748b;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .tb-close:hover { background: #f1f5f9; }

        .tb-add {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .tb-input {
            flex: 1;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 13px;
            outline: none;
        }

        .tb-input:focus { border-color: #4a6cf7; }

        .tb-sel {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 7px 6px;
            font-size: 12px;
            outline: none;
            color: #475569;
            cursor: pointer;
        }

        .tb-btn-add {
            background: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .tb-btn-add:hover { background: #3a5ce5; }

        .tb-filters {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .tb-filter {
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.15s;
        }

        .tb-filter.active, .tb-filter:hover {
            background: #4a6cf7;
            color: #fff;
            border-color: #4a6cf7;
        }

        .tb-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            margin: 0;
            list-style: none;
        }

        .tb-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            transition: background 0.15s;
        }

        .tb-item:hover { background: #f1f5f9; }

        .tb-item-status {
            font-size: 12px;
            flex-shrink: 0;
            color: #4a6cf7;
            font-weight: 600;
        }

        .tb-item-text {
            flex: 1;
            font-size: 13px;
            color: #1e293b;
            word-break: break-all;
        }

        .tb-item-text.done-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .tb-item-change {
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 10px;
            cursor: pointer;
            color: #64748b;
            white-space: nowrap;
        }

        .tb-item-change:hover { background: #e2e8f0; }

        .tb-item-del {
            background: none;
            border: none;
            color: #cbd5e1;
            font-size: 14px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
        }

        .tb-item-del:hover { color: #ef4444; }

        .tb-empty {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            padding: 40px 0;
        }

        .tb-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e2e8f0;
        }

        .tb-count-txt { font-size: 12px; color: #94a3b8; }

        .tb-btn-clear {
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            color: #64748b;
        }

        .tb-btn-clear:hover {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #ef4444;
        }

        #tb-root[data-active-tab='travel'] #tb-toggle {
            top: auto;
            right: 412px;
            bottom: 24px;
            transform: none;
            border-radius: 999px;
            padding: 10px 14px;
            flex-direction: row;
        }

        @media (max-width: 640px) {
            #tb-toggle {
                top: auto;
                right: 16px;
                bottom: 20px;
                transform: none;
                border-radius: 999px;
                padding: 10px 14px;
                flex-direction: row;
            }

            #tb-drawer {
                right: -100%;
                width: min(100%, 360px);
            }

            .tb-add { flex-wrap: wrap; }
            .tb-input { min-width: 100%; }

            .tb-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            #tb-root[data-active-tab='travel'] #tb-toggle { right: 16px; }
        }
        </style>

        <script th:inline="javascript">
            window.TASK_BOARD_CONFIG = {
                pageKey: /*[[${currentPageKey}]]*/ '/',
                csrfHeader: /*[[${_csrf.headerName}]]*/ '',
                csrfToken: /*[[${_csrf.token}]]*/ '',
                labels: {
                    todo: '예정',
                    doing: '진행 중',
                    done: '완료',
                    empty: '이 페이지에는 아직 등록된 작업이 없습니다.',
                    count: '전체 {total}개 · 미완료 {todo}개',
                    deleteLabel: '작업 삭제'
                }
            };
        </script>
        <script th:src="@{/js/task-board.js(v=4)}"></script>
    </th:block>
</th:block>
</html>
